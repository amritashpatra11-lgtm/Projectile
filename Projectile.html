<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>TRAJEKTŌN — Projectile Motion Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a1a;--bg2:#0a0f2a;--panel:rgba(8,14,40,0.92);
  --accent:#00e5ff;--accent2:#a855f7;--accent3:#3b82f6;
  --text:#e0e8ff;--dim:rgba(224,232,255,0.45);--border:rgba(0,229,255,0.12);
  --glow:rgba(0,229,255,0.25);--radius:12px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}

/* ══════ INTRO ══════ */
#intro{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;opacity:1;transition:opacity .6s ease}
#intro.out{opacity:0;pointer-events:none}
#intro .lines{position:absolute;inset:0;overflow:hidden;opacity:.15}
#intro .lines span{position:absolute;width:1px;height:30%;background:linear-gradient(transparent,var(--accent),transparent);animation:scanline 2s linear infinite}
@keyframes scanline{0%{top:-20%}100%{top:120%}}
.intro-name{font-size:clamp(2rem,8vw,4rem);font-weight:900;letter-spacing:.5em;color:var(--accent);text-shadow:0 0 30px var(--glow),0 0 60px rgba(0,229,255,.2);opacity:0;animation:fadeUp .9s .3s forwards}
.intro-tag{font-size:clamp(.55rem,2vw,.8rem);letter-spacing:.4em;color:var(--dim);opacity:0;animation:fadeUp .7s .85s forwards;margin-top:8px}
.intro-dev{font-size:clamp(.6rem,1.8vw,.75rem);letter-spacing:.35em;color:rgba(168,85,247,.7);opacity:0;animation:fadeUp .6s 1.3s forwards;margin-top:36px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ══════ APP SHELL ══════ */
#app{display:none;flex-direction:column;height:100%;width:100%}
#app.show{display:flex}

/* HEADER */
header{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50}
.logo{font-size:.85rem;font-weight:800;letter-spacing:.35em;color:var(--accent);text-shadow:0 0 12px var(--glow)}
.hdr-btns{display:flex;gap:4px}
.hdr-btns button{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);font-size:.65rem;letter-spacing:.1em;padding:5px 10px;border-radius:8px;cursor:pointer;transition:all .25s;font-family:inherit}
.hdr-btns button:hover,.hdr-btns button.on{background:rgba(0,229,255,.08);color:var(--accent);border-color:rgba(0,229,255,.25)}

/* MAIN CANVAS AREA */
#main{flex:1;position:relative;min-height:0;display:flex;flex-direction:column}
#canvas-wrap{flex:1;position:relative;min-height:0;overflow:hidden}
#simCanvas{display:block;width:100%;height:100%;touch-action:none}

/* DATA OVERLAY */
#data-overlay{position:absolute;top:8px;right:8px;background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.68rem;min-width:150px;z-index:20;transition:opacity .3s,transform .3s;font-variant-numeric:tabular-nums}
#data-overlay.hide{opacity:0;transform:translateY(-10px);pointer-events:none}
.d-title{font-weight:700;font-size:.6rem;letter-spacing:.2em;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.d-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--dim)}
.d-row span:last-child{color:var(--text);font-weight:600;font-family:'Courier New',monospace;font-size:.72rem}

/* THROW HINT */
#throw-hint{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:var(--accent2);font-size:.65rem;letter-spacing:.15em;padding:6px 16px;border-radius:20px;z-index:15;opacity:0;transition:opacity .3s;pointer-events:none}
#throw-hint.show{opacity:1}

/* ACTION BAR */
#action-bar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;z-index:20}
.act-btn{border:1px solid var(--border);color:var(--dim);background:rgba(255,255,255,.03);font-size:.62rem;letter-spacing:.12em;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .25s;font-family:inherit;font-weight:600;white-space:nowrap}
.act-btn:active{transform:scale(.95)}
.act-btn.primary{background:linear-gradient(135deg,#0097a7,#00e5ff);color:#000;border-color:transparent;box-shadow:0 0 12px var(--glow)}
.act-btn.primary:hover{box-shadow:0 0 20px var(--glow)}
.act-btn.on{background:rgba(168,85,247,.15);color:var(--accent2);border-color:rgba(168,85,247,.3)}
.act-btn.warn{color:#ff6b6b;border-color:rgba(255,107,107,.2)}
.act-spacer{flex:1}
.spd-group{display:flex;gap:2px;align-items:center}
.spd-group .lbl{font-size:.55rem;color:var(--dim);margin-right:4px;letter-spacing:.1em}
.spd-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);font-size:.58rem;padding:5px 8px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.spd-btn.on{background:rgba(0,229,255,.1);color:var(--accent);border-color:rgba(0,229,255,.25)}

/* ══════ PANELS ══════ */
.panel{position:fixed;bottom:0;left:0;right:0;max-height:62vh;background:var(--panel);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);z-index:200;overflow-y:auto;overscroll-behavior:contain}
.panel.open{transform:translateY(0)}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;position:sticky;top:0;background:var(--panel);z-index:5}
.panel-hdr span{font-size:.65rem;font-weight:700;letter-spacing:.3em;color:var(--accent)}
.panel-close{background:none;border:none;color:var(--dim);font-size:1.3rem;cursor:pointer;padding:0 4px;line-height:1}
.panel-body{padding:4px 18px 24px}

/* CONTROLS */
.ctrl{margin-bottom:14px}
.ctrl label{display:block;font-size:.6rem;letter-spacing:.15em;color:var(--dim);margin-bottom:4px;text-transform:uppercase}
.ctrl-row{display:flex;align-items:center;gap:10px}
.ctrl-row input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.ctrl-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--glow)}
.ctrl-row input[type="range"]::-moz-range-thumb{width:16px;height:16px;background:var(--accent);border-radius:50%;cursor:pointer;border:none;box-shadow:0 0 8px var(--glow)}
.ctrl-row input[type="number"]{width:58px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:5px 6px;border-radius:8px;font-size:.75rem;text-align:right;font-family:inherit;outline:none}
.ctrl-row input[type="number"]:focus{border-color:rgba(0,229,255,.3)}
.ctrl-divider{height:1px;background:var(--border);margin:16px 0}
.ctrl-toggle{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ctrl-toggle label{font-size:.6rem;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{display:none}
.toggle .track{position:absolute;inset:0;background:rgba(255,255,255,.08);border-radius:11px;transition:background .3s}
.toggle input:checked+.track{background:rgba(0,229,255,.2)}
.toggle .knob{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#555;border-radius:50%;transition:all .3s}
.toggle input:checked~.knob{left:21px;background:var(--accent);box-shadow:0 0 8px var(--glow)}

/* GRAPHS */
.graph-box{margin-bottom:16px}
.graph-box h4{font-size:.58rem;letter-spacing:.2em;color:var(--dim);margin-bottom:6px;text-transform:uppercase}
.graph-box canvas{width:100%;height:120px;background:rgba(0,0,0,.25);border-radius:8px;border:1px solid var(--border)}

/* BACKDROP */
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;opacity:0;pointer-events:none;transition:opacity .3s}
#backdrop.show{opacity:1;pointer-events:auto}

/* ══════ RESPONSIVE ══════ */
@media(max-width:380px){
  .act-btn{padding:6px 10px;font-size:.56rem}
  .spd-btn{padding:4px 6px;font-size:.52rem}
  #data-overlay{font-size:.6rem;padding:8px 10px;min-width:130px}
}
@media(min-width:768px){
  .panel{max-width:420px;left:auto;border-left:1px solid var(--border);border-radius:20px 0 0 0}
  #data-overlay{min-width:180px;font-size:.72rem}
}
@media(min-width:1024px){
  .panel{max-height:80vh}
}
</style>
</head>
<body>

<!-- ═══════ INTRO ═══════ -->
<div id="intro">
  <div class="lines">
    <span style="left:15%;animation-delay:0s"></span>
    <span style="left:35%;animation-delay:.4s"></span>
    <span style="left:55%;animation-delay:.8s"></span>
    <span style="left:75%;animation-delay:1.2s"></span>
    <span style="left:90%;animation-delay:.2s"></span>
  </div>
  <div class="intro-name">ARC FLOW</div>
  <div class="intro-tag">PROJECTILE MOTION SIMULATOR</div>
  <div class="intro-dev">Developed by AMRITASH</div>
</div>

<!-- ═══════ APP ═══════ -->
<div id="app">
  <header>
    <div class="logo">ARC FLOW</div>
    <div class="hdr-btns">
      <button id="hb-data" class="on">DATA</button>
      <button id="hb-graphs">GRAPHS</button>
      <button id="hb-controls">CONTROLS</button>
    </div>
  </header>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="simCanvas"></canvas>
      <!-- Data overlay -->
      <div id="data-overlay">
        <div class="d-title"><span class="dot" id="dot-color"></span><span>LIVE TELEMETRY</span></div>
        <div class="d-row"><span>Time</span><span id="dv-t">0.00 s</span></div>
        <div class="d-row"><span>Height</span><span id="dv-h">0.00 m</span></div>
        <div class="d-row"><span>Range</span><span id="dv-r">0.00 m</span></div>
        <div class="d-row"><span>Speed</span><span id="dv-s">0.00 m/s</span></div>
        <div class="d-row"><span>Vx</span><span id="dv-vx">0.00</span></div>
        <div class="d-row"><span>Vy</span><span id="dv-vy">0.00</span></div>
        <div class="d-row"><span>Max H</span><span id="dv-mh">— m</span></div>
        <div class="d-row"><span>T.O.F</span><span id="dv-tf">— s</span></div>
      </div>
      <div id="throw-hint">DRAG ON CANVAS TO THROW</div>
    </div>

    <!-- Action bar -->
    <div id="action-bar">
      <button class="act-btn primary" id="btn-launch">▶ LAUNCH</button>
      <button class="act-btn" id="btn-pause" disabled>⏸ PAUSE</button>
      <button class="act-btn warn" id="btn-reset">↻ RESET</button>
      <button class="act-btn" id="btn-throw">🎯 THROW</button>
      <span class="act-spacer"></span>
      <div class="spd-group">
        <span class="lbl">SPD</span>
        <button class="spd-btn" data-spd="0.25">.25×</button>
        <button class="spd-btn" data-spd="0.5">.5×</button>
        <button class="spd-btn on" data-spd="1">1×</button>
        <button class="spd-btn" data-spd="2">2×</button>
      </div>
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="panel" id="panel-controls">
    <div class="panel-hdr"><span>PARAMETERS</span><button class="panel-close" data-panel="controls">✕</button></div>
    <div class="panel-body">
      <div class="ctrl">
        <label>Initial Velocity (m/s)</label>
        <div class="ctrl-row">
          <input type="range" id="r-vel" min="5" max="200" value="50" step="1">
          <input type="number" id="n-vel" min="5" max="200" value="50" step="1">
        </div>
      </div>
      <div class="ctrl">
        <label>Launch Angle (°)</label>
        <div class="ctrl-row">
          <input type="range" id="r-ang" min="1" max="89" value="45" step="1">
          <input type="number" id="n-ang" min="1" max="89" value="45" step="1">
        </div>
      </div>
      <div class="ctrl">
        <label>Gravity (m/s²)</label>
        <div class="ctrl-row">
          <input type="range" id="r-grav" min="0.5" max="30" value="9.81" step="0.01">
          <input type="number" id="n-grav" min="0.5" max="30" value="9.81" step="0.01">
        </div>
      </div>
      <div class="ctrl">
        <label>Launch Height (m)</label>
        <div class="ctrl-row">
          <input type="range" id="r-ht" min="0" max="100" value="0" step="0.5">
          <input type="number" id="n-ht" min="0" max="100" value="0" step="0.5">
        </div>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-toggle">
        <label>Air Resistance</label>
        <label class="toggle"><input type="checkbox" id="chk-air"><span class="track"></span><span class="knob"></span></label>
      </div>
      <div class="ctrl" id="drag-ctrl" style="display:none">
        <label>Drag Coefficient</label>
        <div class="ctrl-row">
          <input type="range" id="r-drag" min="0.001" max="0.1" value="0.01" step="0.001">
          <input type="number" id="n-drag" min="0.001" max="0.1" value="0.01" step="0.001">
        </div>
      </div>
      <div class="ctrl">
        <label>Bounce Restitution</label>
        <div class="ctrl-row">
          <input type="range" id="r-rest" min="0" max="0.95" value="0.6" step="0.05">
          <input type="number" id="n-rest" min="0" max="0.95" value="0.6" step="0.05">
        </div>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-toggle">
        <label>Sound Effects</label>
        <label class="toggle"><input type="checkbox" id="chk-snd"><span class="track"></span><span class="knob"></span></label>
      </div>
    </div>
  </div>

  <!-- Graphs Panel -->
  <div class="panel" id="panel-graphs">
    <div class="panel-hdr"><span>GRAPHS</span><button class="panel-close" data-panel="graphs">✕</button></div>
    <div class="panel-body">
      <div class="graph-box">
        <h4>Height vs Time</h4>
        <canvas id="graphH"></canvas>
      </div>
      <div class="graph-box">
        <h4>Velocity vs Time</h4>
        <canvas id="graphV"></canvas>
      </div>
    </div>
  </div>

  <div id="backdrop"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   TRAJEKTŌN — Projectile Motion Simulator
   Developed by AMRITASH
   ═══════════════════════════════════════════════ */

// ───────── CONFIGURATION ─────────
const COLORS = ['#00e5ff','#e040fb','#76ff03'];
const MAX_PROJ = 3;
const MAX_TRAIL = 600;
const FIXED_DT = 1/120;
const MAX_DATA = 800;

// ───────── STATE ─────────
const S = {
  vel:50, ang:45, grav:9.81, ht:0,
  airRes:false, dragC:0.01, rest:0.6,
  spdMult:1, soundOn:false,
  showData:true, showGraphs:false, showControls:false,
  throwMode:false,
  running:false, paused:false,
  projectiles:[], nextColor:0, effects:[],
};
let lastTime=0, accumulator=0, frameCount=0;
let audioCtx=null;

// ───────── DOM ─────────
const $=id=>document.getElementById(id);
const canvas=$('simCanvas');
let ctx=canvas.getContext('2d');
let CW=0, CH=0; // logical canvas size
let scale=5, originX=50, originY=0;
let viewW=200, viewH=100;

// Throw state
const throwS={active:false, sx:0, sy:0, cx:0, cy:0, dragging:false};

// ───────── INTRO ─────────
setTimeout(()=>{
  $('intro').classList.add('out');
  setTimeout(()=>{
    $('intro').style.display='none';
    $('app').classList.add('show');
    initApp();
  },600);
},2600);

// ───────── PROJECTILE CLASS ─────────
class Projectile{
  constructor(vx,vy,x0,y0,color){
    this.wx=x0; this.wy=y0;
    this.vx=vx; this.vy=vy;
    this.color=color;
    this.trail=[];
    this.time=0;
    this.active=true;
    this.maxH=y0; this.maxR=0;
    this.hData=[]; this.vData=[];
    this.settled=false;
    this.bounces=0;
    this.tof=0;
    this.dataTick=0;
  }
  update(dt){
    if(!this.active||this.settled)return;
    let ax=0, ay=-S.grav;
    if(S.airRes){
      let spd=Math.hypot(this.vx,this.vy);
      if(spd>0){ax-=S.dragC*this.vx*spd; ay-=S.dragC*this.vy*spd;}
    }
    this.vx+=ax*dt; this.vy+=ay*dt;
    this.wx+=this.vx*dt; this.wy+=this.vy*dt;
    this.time+=dt;
    // Ground collision
    if(this.wy<=0&&this.vy<0){
      this.wy=0;
      let prevVy=this.vy;
      this.vy=-this.vy*S.rest;
      this.vx*=(0.92+0.08*S.rest);
      this.bounces++;
      if(Math.abs(this.vy)<0.4||this.bounces>12){
        this.vy=0;this.vx=0;this.settled=true;this.tof=this.time;
      }else{
        addEffect(this.wx,0,this.color);
        playSound('bounce');
      }
    }
    if(this.wy>this.maxH)this.maxH=this.wy;
    if(this.wx>this.maxR)this.maxR=this.wx;
    this.trail.push({x:this.wx,y:this.wy});
    if(this.trail.length>MAX_TRAIL)this.trail.shift();
    this.dataTick++;
    if(this.dataTick%3===0){
      let spd=Math.hypot(this.vx,this.vy);
      this.hData.push({t:this.time,v:this.wy});
      this.vData.push({t:this.time,v:spd});
      if(this.hData.length>MAX_DATA){
        this.hData=this.hData.filter((_,i)=>i%2===0);
        this.vData=this.vData.filter((_,i)=>i%2===0);
      }
    }
    // Off-screen check
    if(this.wx>viewW*2.5||this.wx<-viewW){this.settled=true;this.tof=this.time;}
  }
}

// ───────── EFFECTS ─────────
function addEffect(wx,wy,color){
  S.effects.push({wx,wy,color,r:3,a:0.7});
}
function updateEffects(dt){
  for(let i=S.effects.length-1;i>=0;i--){
    let e=S.effects[i];
    e.r+=50*dt; e.a-=dt*2.5;
    if(e.a<=0)S.effects.splice(i,1);
  }
}
function drawEffects(){
  for(let e of S.effects){
    let p=w2c(e.wx,e.wy);
    ctx.strokeStyle=hexRGBA(e.color,e.a);
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,e.r,0,Math.PI*2);ctx.stroke();
  }
}

// ───────── SOUND ─────────
function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  if(!S.soundOn)return;
  try{
    let a=getAudio(), o=a.createOscillator(), g=a.createGain();
    o.connect(g);g.connect(a.destination);
    if(type==='launch'){
      o.type='sine';
      o.frequency.setValueAtTime(250,a.currentTime);
      o.frequency.linearRampToValueAtTime(700,a.currentTime+.12);
      g.gain.setValueAtTime(.15,a.currentTime);
      g.gain.linearRampToValueAtTime(0,a.currentTime+.15);
      o.start();o.stop(a.currentTime+.15);
    }else if(type==='bounce'){
      o.type='triangle';
      o.frequency.setValueAtTime(180,a.currentTime);
      o.frequency.linearRampToValueAtTime(60,a.currentTime+.08);
      g.gain.setValueAtTime(.12,a.currentTime);
      g.gain.linearRampToValueAtTime(0,a.currentTime+.1);
      o.start();o.stop(a.currentTime+.1);
    }
  }catch(e){}
}

// ───────── UTILITIES ─────────
function hexRGBA(hex,a){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function w2c(wx,wy){return{x:originX+wx*scale,y:originY-wy*scale};}
function c2w(cx,cy){return{x:(cx-originX)/scale,y:(originY-cy)/scale};}
function niceStep(ppm,target){
  let m=target/ppm;
  let mag=Math.pow(10,Math.floor(Math.log10(m)));
  let res=m/mag;
  if(res<1.5)return mag;if(res<3.5)return 2*mag;if(res<7.5)return 5*mag;return 10*mag;
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function fmt(v,d=2){return v.toFixed(d);}

// ───────── CANVAS SETUP ─────────
function resizeCanvas(){
  let wrap=$('canvas-wrap');
  let rect=wrap.getBoundingClientRect();
  let dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  CW=rect.width;CH=rect.height;
  updateView();
  // Resize graph canvases
  resizeGraphCanvas($('graphH'));
  resizeGraphCanvas($('graphV'));
}
function resizeGraphCanvas(c){
  if(!c)return;
  let rect=c.getBoundingClientRect();
  let dpr=window.devicePixelRatio||1;
  c.width=rect.width*dpr;
  c.height=rect.height*dpr;
}

// ───────── VIEW CALCULATION ─────────
function calcTheoretical(){
  let v=S.vel,th=S.ang*Math.PI/180,g=S.grav,h=S.ht;
  let vx=v*Math.cos(th),vy=v*Math.sin(th);
  let disc=vy*vy+2*g*h;
  let tof=disc>0?(vy+Math.sqrt(disc))/g:vy/g;
  if(tof<0)tof=0;
  let range=vx*tof;
  let maxH=h+vy*vy/(2*g);
  return{tof,range,maxH,vx,vy};
}
function updateView(){
  let th=calcTheoretical();
  viewW=Math.max(th.range*1.35,50);
  viewH=Math.max(th.maxH*1.35,30);
  let ml=52,mr=10,mt=10,mb=30;
  let aw=CW-ml-mr,ah=CH-mt-mb;
  if(aw<10)aw=10;if(ah<10)ah=10;
  scale=Math.min(aw/viewW,ah/viewH);
  scale=clamp(scale,0.3,80);
  originX=ml;
  originY=CH-mb;
  // Recalculate viewW/viewH based on final scale for grid
  viewW=(CW-ml-mr)/scale;
  viewH=(CH-mt-mb)/scale;
}

// ───────── RENDERING ─────────
function render(){
  // Background
  ctx.fillStyle='#060a1a';
  ctx.fillRect(0,0,CW,CH);

  drawGrid();
  drawGround();
  if((!S.running||S.paused)&&!S.throwMode)drawPreview();
  // Draw launch point
  drawLaunchPoint();
  for(let p of S.projectiles){drawTrail(p);drawProjectileBall(p);}
  drawEffects();
  if(S.throwMode&&throwS.dragging)drawThrowArrow();
}

function drawGrid(){
  let step=niceStep(scale,70);
  ctx.lineWidth=1;
  // Vertical
  for(let wx=0;wx<=viewW;wx+=step){
    let x=originX+wx*scale;
    if(x>CW)break;
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();
  }
  // Horizontal
  for(let wy=0;wy<=viewH;wy+=step){
    let y=originY-wy*scale;
    if(y<0)break;
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();
  }
  // Labels
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='9px monospace';
  ctx.textAlign='center';
  for(let wx=step;wx<=viewW;wx+=step){
    let x=originX+wx*scale;
    if(x>CW-15)break;
    let label=step>=1?Math.round(wx):wx.toFixed(1);
    ctx.fillText(label+'m',x,originY+14);
  }
  ctx.textAlign='right';
  for(let wy=step;wy<=viewH;wy+=step){
    let y=originY-wy*scale;
    if(y<5)break;
    let label=step>=1?Math.round(wy):wy.toFixed(1);
    ctx.fillText(label,originX-6,y+3);
  }
  ctx.textAlign='left';
}

function drawGround(){
  let gy=originY;
  // Ground fill
  let grd=ctx.createLinearGradient(0,gy,0,gy+40);
  grd.addColorStop(0,'rgba(0,229,255,0.04)');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.fillRect(0,gy,CW,40);
  // Ground line
  ctx.strokeStyle='rgba(0,229,255,0.18)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(CW,gy);ctx.stroke();
}

function drawLaunchPoint(){
  let lp=w2c(0,S.ht);
  // Pulsing dot
  let pulse=0.5+0.5*Math.sin(performance.now()/400);
  ctx.fillStyle=hexRGBA('#00e5ff',0.15+pulse*0.15);
  ctx.beginPath();ctx.arc(lp.x,lp.y,8+pulse*4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#00e5ff';
  ctx.beginPath();ctx.arc(lp.x,lp.y,3,0,Math.PI*2);ctx.fill();
  // Height indicator line if ht > 0
  if(S.ht>0){
    ctx.strokeStyle='rgba(0,229,255,0.15)';
    ctx.setLineDash([3,4]);
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(lp.x,originY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,229,255,0.3)';
    ctx.font='9px monospace';
    ctx.fillText(fmt(S.ht,1)+'m',lp.x+6,lp.y+((originY-lp.y)/2));
  }
}

function drawPreview(){
  let v=S.vel,th=S.ang*Math.PI/180,g=S.grav,h=S.ht;
  let vx=v*Math.cos(th),vy=v*Math.sin(th);
  let t=calcTheoretical();
  ctx.strokeStyle='rgba(0,229,255,0.12)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,6]);
  ctx.beginPath();
  let steps=120;
  for(let i=0;i<=steps;i++){
    let tt=(t.tof*i)/steps;
    let wx=vx*tt, wy=h+vy*tt-0.5*g*tt*tt;
    if(wy<0)break;
    let p=w2c(wx,wy);
    if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
  }
  ctx.stroke();ctx.setLineDash([]);
  // Angle arc
  let lp=w2c(0,h);
  let arcR=clamp(30,15,50);
  ctx.strokeStyle='rgba(0,229,255,0.2)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(lp.x,lp.y,arcR,-(S.ang*Math.PI/180),0);ctx.stroke();
  ctx.fillStyle='rgba(0,229,255,0.35)';
  ctx.font='10px monospace';
  ctx.fillText(S.ang+'°',lp.x+arcR+5,lp.y-4);
  // Velocity arrow
  let arrowLen=clamp(S.vel*0.5,20,80);
  let ax=lp.x+arrowLen*Math.cos(th);
  let ay=lp.y-arrowLen*Math.sin(th);
  ctx.strokeStyle='rgba(0,229,255,0.2)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(ax,ay);ctx.stroke();
  // Arrowhead
  let aSize=6,aAngle=Math.atan2(lp.y-ay,ax-lp.x);
  // Not worth the complexity — skip arrowhead for cleanliness
  // Predicted values text
  ctx.fillStyle='rgba(0,229,255,0.25)';
  ctx.font='9px monospace';
  let infoY=14;
  ctx.fillText('Range: '+fmt(t.range,1)+' m',originX+8,infoY);
  ctx.fillText('Max H: '+fmt(t.maxH,1)+' m',originX+8,infoY+13);
  ctx.fillText('T.O.F: '+fmt(t.tof,2)+' s',originX+8,infoY+26);
}

function drawTrail(p){
  if(p.trail.length<2)return;
  let len=p.trail.length;
  // Batch draw in chunks of similar opacity for performance
  let chunkSize=Math.max(1,Math.floor(len/30));
  ctx.lineWidth=2;
  ctx.lineCap='round';ctx.lineJoin='round';
  for(let c=0;c<len-1;c+=chunkSize){
    let end=Math.min(c+chunkSize+1,len);
    let midIdx=Math.floor((c+end)/2);
    let a=(midIdx/len)*0.6;
    ctx.strokeStyle=hexRGBA(p.color,a);
    ctx.beginPath();
    let first=w2c(p.trail[c].x,p.trail[c].y);
    ctx.moveTo(first.x,first.y);
    for(let i=c+1;i<end;i++){
      let pt=w2c(p.trail[i].x,p.trail[i].y);
      ctx.lineTo(pt.x,pt.y);
    }
    ctx.stroke();
  }
  ctx.lineCap='butt';ctx.lineJoin='miter';
}

function drawProjectileBall(p){
  let pos=w2c(p.wx,p.wy);
  if(pos.x<-20||pos.x>CW+20||pos.y<-20||pos.y>CH+20)return;
  // Glow
  let grad=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,16);
  grad.addColorStop(0,hexRGBA(p.color,0.5));
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;
  ctx.fillRect(pos.x-16,pos.y-16,32,32);
  // Outer ring
  ctx.strokeStyle=hexRGBA(p.color,0.6);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(pos.x,pos.y,5,0,Math.PI*2);ctx.stroke();
  // Core
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(pos.x,pos.y,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(pos.x,pos.y,2.5,0,Math.PI*2);ctx.fill();

  // Velocity arrow on active projectile
  if(!p.settled){
    let vScale=0.4;
    let vLen=Math.hypot(p.vx,p.vy)*vScale;
    if(vLen>3){
      let vAng=Math.atan2(-p.vy,p.vx);// canvas coords
      let ex=pos.x+Math.cos(vAng)*clamp(vLen,5,40);
      let ey=pos.y+Math.sin(vAng)*clamp(vLen,5,40);
      ctx.strokeStyle=hexRGBA(p.color,0.35);
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pos.x,pos.y);ctx.lineTo(ex,ey);ctx.stroke();
    }
  }
}

function drawThrowArrow(){
  let lp=w2c(0,S.ht);
  let dx=throwS.cx-throwS.sx;
  let dy=throwS.sy-throwS.cy; // invert Y so up is positive
  let dist=Math.hypot(dx,dy);
  if(dist<5)return;
  let ang=Math.atan2(dy,dx);
  // Clamp angle to 0-89 degrees (upward throws only)
  if(ang<0.02)ang=0.02;
  if(ang>Math.PI/2-0.02)ang=Math.PI/2-0.02;
  let vel=clamp(dist*0.5,5,200);
  let angDeg=clamp(ang*180/Math.PI,1,89);
  // Arrow from launch point in the launch direction
  let arrowLen=clamp(dist*0.8,10,150);
  let ex=lp.x+Math.cos(ang)*arrowLen;
  let ey=lp.y-Math.sin(ang)*arrowLen;

  // Dashed arrow line
  ctx.strokeStyle=hexRGBA('#a855f7',0.6);
  ctx.lineWidth=2.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.setLineDash([]);
  // Arrowhead circle at end
  ctx.fillStyle=hexRGBA('#a855f7',0.5);
  ctx.beginPath();ctx.arc(ex,ey,6,0,Math.PI*2);ctx.fill();
  // Velocity and angle labels
  ctx.fillStyle='rgba(168,85,247,0.85)';
  ctx.font='bold 11px monospace';
  ctx.fillText(fmt(vel,0)+' m/s',ex+12,ey-8);
  ctx.fillText(fmt(angDeg,0)+'°',ex+12,ey+8);

  // Ghost preview trajectory for throw
  let vx=vel*Math.cos(ang);
  let vy=vel*Math.sin(ang);
  let g=S.grav,h=S.ht;
  let disc=vy*vy+2*g*h;
  let tof=disc>0?(vy+Math.sqrt(disc))/g:0;
  if(tof>0){
    ctx.strokeStyle='rgba(168,85,247,0.12)';
    ctx.lineWidth=1.5;
    ctx.setLineDash([3,5]);
    ctx.beginPath();
    let steps=80;
    for(let i=0;i<=steps;i++){
      let t=(tof*i)/steps;
      let wx=vx*t,wy=h+vy*t-0.5*g*t*t;
      if(wy<0)break;
      let pt=w2c(wx,wy);
      if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);
    }
    ctx.stroke();ctx.setLineDash([]);
  }
}

// ───────── GRAPHS ─────────
function drawGraph(canvasEl,dataArrays,yLabel){
  let c=canvasEl;
  if(!c||!c.width)return;
  let gx=c.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let w=c.width/dpr,h=c.height/dpr;
  gx.setTransform(dpr,0,0,dpr,0,0);
  let pad={l:38,r:8,t:8,b:20};
  let pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
  // Background
  gx.fillStyle='rgba(6,10,26,0.95)';
  gx.fillRect(0,0,w,h);
  if(pw<10||ph<10)return;
  // Find ranges
  let maxT=0,maxY=0;
  for(let d of dataArrays){
    for(let pt of d.pts){
      if(pt.t>maxT)maxT=pt.t;
      if(pt.v>maxY)maxY=pt.v;
    }
  }
  if(maxT===0)maxT=1;if(maxY===0)maxY=1;
  maxY*=1.1;maxT*=1.05;
  // Grid
  gx.strokeStyle='rgba(255,255,255,0.06)';
  gx.lineWidth=1;
  for(let i=1;i<=4;i++){
    let y=pad.t+ph*(1-i/4);
    gx.beginPath();gx.moveTo(pad.l,y);gx.lineTo(pad.l+pw,y);gx.stroke();
  }
  for(let i=1;i<=4;i++){
    let x=pad.l+pw*i/4;
    gx.beginPath();gx.moveTo(x,pad.t);gx.lineTo(x,pad.t+ph);gx.stroke();
  }
  // Axes
  gx.strokeStyle='rgba(255,255,255,0.15)';
  gx.beginPath();gx.moveTo(pad.l,pad.t);gx.lineTo(pad.l,pad.t+ph);gx.lineTo(pad.l+pw,pad.t+ph);gx.stroke();
  // Labels
  gx.fillStyle='rgba(255,255,255,0.25)';
  gx.font='8px monospace';
  gx.textAlign='right';
  for(let i=0;i<=4;i++){
    let val=(maxY*i/4);
    let y=pad.t+ph*(1-i/4);
    gx.fillText(fmt(val,1),pad.l-4,y+3);
  }
  gx.textAlign='center';
  for(let i=1;i<=4;i++){
    let val=(maxT*i/4);
    let x=pad.l+pw*i/4;
    gx.fillText(fmt(val,1)+'s',x,h-3);
  }
  gx.textAlign='left';
  // Y label
  gx.save();gx.translate(8,pad.t+ph/2);gx.rotate(-Math.PI/2);
  gx.fillStyle='rgba(255,255,255,0.2)';gx.font='8px monospace';gx.textAlign='center';
  gx.fillText(yLabel,0,0);gx.restore();
  // Data lines
  for(let d of dataArrays){
    if(d.pts.length<2)continue;
    gx.strokeStyle=d.color;
    gx.lineWidth=1.5;
    gx.beginPath();
    for(let i=0;i<d.pts.length;i++){
      let x=pad.l+(d.pts[i].t/maxT)*pw;
      let y=pad.t+ph*(1-d.pts[i].v/maxY);
      if(i===0)gx.moveTo(x,y);else gx.lineTo(x,y);
    }
    gx.stroke();
  }
}
function updateGraphs(){
  let hData=[],vData=[];
  for(let p of S.projectiles){
    hData.push({pts:p.hData,color:p.color});
    vData.push({pts:p.vData,color:p.color});
  }
  drawGraph($('graphH'),hData,'Height (m)');
  drawGraph($('graphV'),vData,'Speed (m/s)');
}

// ───────── DATA DISPLAY ─────────
function updateDataDisplay(){
  let p=S.projectiles.length>0?S.projectiles[S.projectiles.length-1]:null;
  if(!p){
    $('dv-t').textContent='0.00 s';
    $('dv-h').textContent='0.00 m';
    $('dv-r').textContent='0.00 m';
    $('dv-s').textContent='0.00 m/s';
    $('dv-vx').textContent='0.00';
    $('dv-vy').textContent='0.00';
    $('dv-mh').textContent='— m';
    $('dv-tf').textContent='— s';
    $('dot-color').style.background='var(--accent)';
    return;
  }
  $('dot-color').style.background=p.color;
  let spd=Math.hypot(p.vx,p.vy);
  $('dv-t').textContent=fmt(p.time)+' s';
  $('dv-h').textContent=fmt(Math.max(0,p.wy),2)+' m';
  $('dv-r').textContent=fmt(p.maxR,2)+' m';
  $('dv-s').textContent=fmt(spd,2)+' m/s';
  $('dv-vx').textContent=fmt(p.vx,2);
  $('dv-vy').textContent=fmt(p.vy,2);
  $('dv-mh').textContent=fmt(p.maxH,2)+' m';
  $('dv-tf').textContent=p.settled?fmt(p.tof,2)+' s':'...';
}

// ───────── LAUNCH ─────────
function launchProjectile(vel,angDeg,fromThrow){
  if(S.projectiles.length>=MAX_PROJ)S.projectiles.shift();
  let th=angDeg*Math.PI/180;
  let vx=vel*Math.cos(th),vy=vel*Math.sin(th);
  let color=COLORS[S.nextColor%COLORS.length];
  S.nextColor++;
  let p=new Projectile(vx,vy,0,S.ht,color);
  S.projectiles.push(p);
  S.running=true;S.paused=false;
  $('btn-pause').disabled=false;
  $('btn-pause').textContent='⏸ PAUSE';
  if(!fromThrow)updateView();
  playSound('launch');
}

// ───────── THROW MODE ─────────
function initThrowMode(){
  canvas.addEventListener('pointerdown',onThrowDown);
  canvas.addEventListener('pointermove',onThrowMove);
  canvas.addEventListener('pointerup',onThrowUp);
  canvas.addEventListener('pointercancel',onThrowUp);
}
function onThrowDown(e){
  if(!S.throwMode)return;
  e.preventDefault();
  let rect=canvas.getBoundingClientRect();
  throwS.sx=e.clientX-rect.left;
  throwS.sy=e.clientY-rect.top;
  throwS.cx=throwS.sx;throwS.cy=throwS.sy;
  throwS.dragging=true;
  canvas.setPointerCapture(e.pointerId);
}
function onThrowMove(e){
  if(!throwS.dragging)return;
  e.preventDefault();
  let rect=canvas.getBoundingClientRect();
  throwS.cx=e.clientX-rect.left;
  throwS.cy=e.clientY-rect.top;
}
function onThrowUp(e){
  if(!throwS.dragging)return;
  throwS.dragging=false;
  let dx=throwS.cx-throwS.sx;
  let dy=throwS.sy-throwS.cy; // invert Y
  let dist=Math.hypot(dx,dy);
  if(dist<10)return;// Too short, ignore
  let ang=Math.atan2(dy,dx);
  // Clamp to valid upward angle
  if(ang<0.02)ang=0.02;
  if(ang>Math.PI/2-0.02)ang=Math.PI/2-0.02;
  let vel=clamp(dist*0.5,5,200);
  let angDeg=clamp(ang*180/Math.PI,1,89);
  // Update sliders to reflect throw parameters
  S.vel=Math.round(vel);S.ang=Math.round(angDeg);
  syncSliders();
  updateView();
  launchProjectile(vel,angDeg,true);
}

// ───────── PHYSICS LOOP ─────────
function gameLoop(ts){
  if(!lastTime)lastTime=ts;
  let frameDt=(ts-lastTime)/1000;
  lastTime=ts;
  if(frameDt>0.1)frameDt=0.1;
  frameCount++;

  if(S.running&&!S.paused){
    accumulator+=frameDt*S.spdMult;
    let steps=0;
    while(accumulator>=FIXED_DT&&steps<20){
      for(let p of S.projectiles)p.update(FIXED_DT);
      updateEffects(FIXED_DT);
      accumulator-=FIXED_DT;
      steps++;
    }
    // Check all done
    if(S.projectiles.length>0&&S.projectiles.every(p=>p.settled)){
      S.running=false;
      $('btn-pause').disabled=true;
    }
  }

  render();
  updateDataDisplay();

  if(S.showGraphs&&frameCount%5===0)updateGraphs();

  requestAnimationFrame(gameLoop);
}

// ───────── UI WIRING ─────────
function syncSliders(){
  $('r-vel').value=S.vel;$('n-vel').value=S.vel;
  $('r-ang').value=S.ang;$('n-ang').value=S.ang;
  $('r-grav').value=S.grav;$('n-grav').value=S.grav;
  $('r-ht').value=S.ht;$('n-ht').value=S.ht;
  $('r-drag').value=S.dragC;$('n-drag').value=S.dragC;
  $('r-rest').value=S.rest;$('n-rest').value=S.rest;
}
function wireCtrl(rId,nId,key,cb){
  let r=$(rId),n=$(nId);
  r.addEventListener('input',()=>{n.value=r.value;S[key]=parseFloat(r.value);if(cb)cb();updateView();});
  n.addEventListener('change',()=>{let v=clamp(parseFloat(n.value),parseFloat(r.min),parseFloat(r.max));n.value=v;r.value=v;S[key]=v;if(cb)cb();updateView();});
}
function initUI(){
  wireCtrl('r-vel','n-vel','vel');
  wireCtrl('r-ang','n-ang','ang');
  wireCtrl('r-grav','n-grav','grav');
  wireCtrl('r-ht','n-ht','ht');
  wireCtrl('r-drag','n-drag','dragC');
  wireCtrl('r-rest','n-rest','rest');

  $('chk-air').addEventListener('change',e=>{
    S.airRes=e.target.checked;
    $('drag-ctrl').style.display=S.airRes?'block':'none';
  });
  $('chk-snd').addEventListener('change',e=>{
    S.soundOn=e.target.checked;
    if(S.soundOn)getAudio();// Init audio context on user gesture
  });

  // Launch
  $('btn-launch').addEventListener('click',()=>{
    launchProjectile(S.vel,S.ang,false);
  });
  // Pause
  $('btn-pause').addEventListener('click',()=>{
    if(!S.running)return;
    S.paused=!S.paused;
    $('btn-pause').textContent=S.paused?'▶ RESUME':'⏸ PAUSE';
  });
  // Reset
  $('btn-reset').addEventListener('click',()=>{
    S.projectiles=[];S.effects=[];
    S.running=false;S.paused=false;
    S.nextColor=0;accumulator=0;
    $('btn-pause').disabled=true;
    $('btn-pause').textContent='⏸ PAUSE';
    updateView();
    if(S.showGraphs)updateGraphs();
    updateDataDisplay();
  });
  // Throw
  $('btn-throw').addEventListener('click',()=>{
    S.throwMode=!S.throwMode;
    $('btn-throw').classList.toggle('on',S.throwMode);
    $('throw-hint').classList.toggle('show',S.throwMode);
    $('btn-launch').disabled=S.throwMode;
    $('btn-launch').style.opacity=S.throwMode?'0.4':'1';
  });
  // Speed
  document.querySelectorAll('.spd-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.spd-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      S.spdMult=parseFloat(b.dataset.spd);
    });
  });

  // Header buttons
  $('hb-data').addEventListener('click',()=>{
    S.showData=!S.showData;
    $('hb-data').classList.toggle('on',S.showData);
    $('data-overlay').classList.toggle('hide',!S.showData);
  });
  $('hb-graphs').addEventListener('click',()=>{
    S.showGraphs=!S.showGraphs;
    $('hb-graphs').classList.toggle('on',S.showGraphs);
    togglePanel('graphs',S.showGraphs);
    if(S.showGraphs){
      S.showControls=false;
      $('hb-controls').classList.remove('on');
      $('panel-controls').classList.remove('open');
      setTimeout(()=>{resizeGraphCanvas($('graphH'));resizeGraphCanvas($('graphV'));updateGraphs();},100);
    }
  });
  $('hb-controls').addEventListener('click',()=>{
    S.showControls=!S.showControls;
    $('hb-controls').classList.toggle('on',S.showControls);
    togglePanel('controls',S.showControls);
    if(S.showControls){
      S.showGraphs=false;
      $('hb-graphs').classList.remove('on');
      $('panel-graphs').classList.remove('open');
    }
  });

  // Panel close buttons
  document.querySelectorAll('.panel-close').forEach(b=>{
    b.addEventListener('click',()=>{
      let pName=b.dataset.panel;
      $('panel-'+pName).classList.remove('open');
      $('backdrop').classList.remove('show');
      if(pName==='controls'){S.showControls=false;$('hb-controls').classList.remove('on');}
      if(pName==='graphs'){S.showGraphs=false;$('hb-graphs').classList.remove('on');}
    });
  });

  // Backdrop click closes panels
  $('backdrop').addEventListener('click',()=>{
    document.querySelectorAll('.panel.open').forEach(p=>p.classList.remove('open'));
    $('backdrop').classList.remove('show');
    S.showControls=false;S.showGraphs=false;
    $('hb-controls').classList.remove('on');
    $('hb-graphs').classList.remove('on');
  });
}

function togglePanel(name,show){
  $('panel-'+name).classList.toggle('open',show);
  let anyOpen=document.querySelector('.panel.open');
  $('backdrop').classList.toggle('show',!!anyOpen);
}

// ───────── INIT ─────────
function initApp(){
  resizeCanvas();
  syncSliders();
  initUI();
  initThrowMode();
  window.addEventListener('resize',()=>{resizeCanvas();});
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
